# Blondie Secrets Template - COPY TO secrets.env.yaml and fill values
# Mount at runtime: docker run -v ./secrets.env.yaml:/workspace/.agent/secrets.env.yaml
# Never commit real values - add to .gitignore

llm:
  # OpenAI-compatible endpoints (Anthropic, Grok, local Ollama, in-house)
  openai:
    api_base: "https://api.openai.com/v1"  # or your proxy/ollama endpoint
    api_key: "sk-proj-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
  
  anthropic:
    api_base: "https://api.anthropic.com/v1"
    api_key: "claude-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
  
  # Generic HTTP LLM (in-house models)
  custom:
    endpoint: "https://your-llm.company/api/v1/chat/completions"
    api_key: "Bearer your-custom-token"

cloud:
  vercel:
    # Vercel CLI token (vercel login --token)
    token: "V3rC3l_t0k3n_XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
    # Optional: team ID for org projects
    team_id: ""
  
  netlify:
    # Netlify CLI token (netlify login --token) 
    token: "N3tL1fY_t0k3n_XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
    site_id: "your-site-id-optional"

git:
  # GitHub/GitLab Personal Access Token for PR creation
  github_token: "ghp_XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
  gitlab_token: "glp4t_XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"

# Global limits (optional overrides)
limits:
  max_daily_cost_usd: 10.0
  max_concurrent_tasks: 5
  max_retries_per_task: 3

# Observability (optional)
observability:
  slack_webhook: "https://hooks.slack.com/services/T000/B000/C000"  # Task completion alerts
  log_level: "INFO"  # DEBUG, INFO, WARN, ERROR
