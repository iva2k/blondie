# Test repo Self-Policy
autonomy:
  gates:
    git-merge: allow
    deploy-docker: allow        # Self-deploy OK
    install-binary: prompt      # apt installs need review
    add-package: allow          # pip requirements OK
    shell: allow                # use of shell
    shell-files: allow          # direct change of files
  test_retries: 3
  coordination: git             # git | filelock | none

commands:
  install: poetry install
  test: poetry run pytest tests/
  build: python -m build
  lint: ruff check .

git:
  branch-prefix: "task-"
  merge-strategy: rebase
  test-gate: "test && lint"

docs:
  always-update:
    - README.md
    - docs/CHANGELOG.md

limits:
  max_test_retries: 3       # Max number of test-debug-fix loop
  max_shell_retries: 3      # Max retries for failed shell commands
  max_daily_cost_usd: 10.0
  max_total_cost_usd: 100.0
  max_concurrent_tasks: 5
