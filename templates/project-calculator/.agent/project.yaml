id: Calculator
name: "Calculator project"
languages: [python]
git_user: "Blondie Agent"
git_email: "blondie@agent.local"
main_branch: main
task_source: TASKS.md
sleep_no_connection: 30
sleep_daily_limit: 3600
exit_on_no_tasks: True
exit_on_exception: True
commands:
  install: poetry install
  test: poetry run pytest tests/
  build: python -m build
  lint: ruff check .
policy: POLICY.yaml
dev_config: dev.yaml
docs:
  - README.md
  - docs/
deploy:
  docker: docker build -t blondie:v1 .
protected_files:
  - .agent/llm.yaml
  - .agent/POLICY.yaml
  - .agent/project.yaml
  - .agent/secrets.env.yaml
  - .agent/dev.yaml
  - .venv
  - poetry.lock
